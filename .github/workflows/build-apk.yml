name: Build APK

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'URL de la API (ej: https://nexus-api.iamlaura.dev)'
        required: false
        default: 'https://nexus-api.iamlaura.dev'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        working-directory: frontend
        run: flutter pub get

      - name: Build APK
        working-directory: frontend
        run: |
          flutter build apk --release \
            --dart-define=API_URL=${{ github.event.inputs.api_url || 'https://nexus-api.iamlaura.dev' }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-release
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
