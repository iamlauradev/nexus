# Postgres tuning for low-memory server (3.7GB total, ~256MB limit for this instance)
# Generated for: nexus_postgres

# Memory
shared_buffers = 32MB                  # Default is 128MB; 25% of container limit
effective_cache_size = 128MB           # Estimate of OS + postgres cache available
work_mem = 4MB                         # Per-sort/per-hash: keep low, nexus has light queries
maintenance_work_mem = 32MB            # For VACUUM, CREATE INDEX

# Connections
max_connections = 20                   # nexus_backend uses a pool; 20 is plenty

# WAL / Checkpoints
wal_buffers = 4MB
checkpoint_completion_target = 0.9
min_wal_size = 32MB
max_wal_size = 256MB

# Planner
random_page_cost = 1.1                 # SSD/overlay FS: lower is better than 4.0 default
effective_io_concurrency = 200         # SSD-backed storage

# Logging (minimal for homelab)
log_min_duration_statement = 1000      # Log queries slower than 1s
