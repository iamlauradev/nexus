name: nexus
description: "Nexus - Media Tracker"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  http: ^1.2.1
  shared_preferences: ^2.3.1
  cached_network_image: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0
  fl_chart: ^0.68.0
  go_router: ^14.2.0
  provider: ^6.1.2
  # Riverpod — next-gen state management (migration in progress)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  image_picker: ^1.1.2
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  share_plus: ^10.0.3
  screenshot: ^3.0.0
  file_picker: ^8.0.7
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel-Regular.ttf
        - asset: assets/fonts/Cinzel-Bold.ttf
          weight: 700
    - family: Crimson
      fonts:
        - asset: assets/fonts/CrimsonText-Regular.ttf
        - asset: assets/fonts/CrimsonText-Italic.ttf
          style: italic
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans[opsz,wght].ttf
        - asset: assets/fonts/DMSans-Italic[opsz,wght].ttf
          style: italic
