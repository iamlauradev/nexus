server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter web SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Entry points: NEVER cache — Flutter updates these on every build
    location ~* ^/(index\.html|main\.dart\.js|flutter\.js|flutter_bootstrap\.js|flutter_service_worker\.js|version\.json)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Hashed assets (Flutter content-hashes the filenames) — safe to cache long-term
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # CanvasKit — versioned by Flutter, safe to cache
    location /canvaskit/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Everything else: short cache
    location ~* \.(css|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/plain application/javascript text/css application/json;
}
